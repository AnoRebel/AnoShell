# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                                ANO CONFIG                                ║
# ║     A standalone Hyprland config with Ano QuickShell UI                  ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

# Quickshell config name — stored in ~/.config/quickshell/ano/
$qsConfig = ano

# Required for catchall keybinds to work with quickshell
exec = hyprctl dispatch submap global
submap = global

# ═══════════════════════════════════════════════════════════════════════════
# Default configuration modules
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/Ano/hyprland/env.conf
source = ~/.config/hypr/Ano/hyprland/execs.conf
source = ~/.config/hypr/Ano/hyprland/general.conf
source = ~/.config/hypr/Ano/hyprland/rules.conf
source = ~/.config/hypr/Ano/hyprland/colors.conf
source = ~/.config/hypr/Ano/hyprland/keybinds.conf

# ═══════════════════════════════════════════════════════════════════════════
# Custom overrides (your personal preferences — edit these freely)
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/Ano/custom/env.conf
source = ~/.config/hypr/Ano/custom/execs.conf
source = ~/.config/hypr/Ano/custom/general.conf
source = ~/.config/hypr/Ano/custom/rules.conf
source = ~/.config/hypr/Ano/custom/keybinds.conf
source = ~/.config/hypr/Ano/custom/colors.conf

# ═══════════════════════════════════════════════════════════════════════════
# Monitor and workspace configuration (create these if needed)
# ═══════════════════════════════════════════════════════════════════════════
# source = ~/.config/hypr/Ano/monitors.conf
# source = ~/.config/hypr/Ano/workspaces.conf
