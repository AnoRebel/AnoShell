# ═══════════════════════════════════════════════════════════════════════════
# WINDOW RULES - Ano Config
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
# FLOATING WINDOWS
# ═══════════════════════════════════════════════════════════════════════════

# File dialogs
windowrule = match:title ^(Open File)(.*)$, center on, float on
windowrule = match:title ^(Select a File)(.*)$, center on, float on
windowrule = match:title ^(Open Folder)(.*)$, center on, float on
windowrule = match:title ^(Save As)(.*)$, center on, float on
windowrule = match:title ^(Choose Files)$, float on
windowrule = match:title ^(File Upload)(.*)$, center on, float on
windowrule = match:title ^(.*)(wants to save)$, center on, float on
windowrule = match:title ^(.*)(wants to open)$, center on, float on

# System utilities
windowrule = match:class ^(pavucontrol)$, float on, size (monitor_w*.45) (monitor_h*.45), center on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, size (monitor_w*.45) (monitor_h*.45), center on
windowrule = match:class ^(blueman-manager)$, float on, opacity 0.80 0.70
windowrule = match:class ^(nm-connection-editor)$, float on, size (monitor_w*.45) (monitor_h*.45), center on
windowrule = match:class ^(nm-applet)$, float on
windowrule = match:title ^(btop)$, float on
windowrule = match:class ^(nwg-look)$, float on, opacity 0.80 0.80
windowrule = match:class ^(qt5ct|qt6ct)$, float on, opacity 0.80 0.80
windowrule = match:class ^(stacer)$, float on, center on

# Float, resize and center
windowrule = float true, match:class kitty, match:title nmtui
windowrule = size 60% 70%, match:class kitty, match:title nmtui
windowrule = center 1, match:class kitty, match:title nmtui
windowrule = float true, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings
windowrule = float true, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = float true, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look
windowrule = opacity 0.80 0.80, match:class ^(nwg-look)$

# Authentication
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on, opacity 0.80 0.70
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, float on, opacity 0.80 0.70

# ═══════════════════════════════════════════════════════════════════════════
# QUICKSHELL LAYER RULES
# ═══════════════════════════════════════════════════════════════════════════

# Ano shell layers — blur and animation
layerrule = blur, ano.*
layerrule = ignorealpha 0.1, ano.*
layerrule = xray 0, ano.*
layerrule = animation popin 93%, ano.*

# Specific panel behavior
layerrule = noanim, ano-bar.*
layerrule = blur, ano-bar.*

# ═══════════════════════════════════════════════════════════════════════════
# TEARING / GAME RULES
# ═══════════════════════════════════════════════════════════════════════════
windowrule = immediate, match:class ^(cs2)$
windowrule = immediate, match:class ^(steam_app_.*)$

# ═══════════════════════════════════════════════════════════════════════════
# PICTURE-IN-PICTURE
# ═══════════════════════════════════════════════════════════════════════════
windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, size 25% 25%
windowrule = match:title ^(Picture in picture)$, float on, pin on, size 25% 25%

# ═══════════════════════════════════════════════════════════════════════════
# MISC
# ═══════════════════════════════════════════════════════════════════════════
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.gtk)$, float on
