# ═══════════════════════════════════════════════════════════════════════════
# STARTUP APPLICATIONS - Ano Config
# ═══════════════════════════════════════════════════════════════════════════

# XDG Portal and Wayland integration
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Quickshell (Ano UI) — main shell interface
exec-once = qs -c $qsConfig &

# Core components
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle
exec-once = hyprpm reload

# Authentication agent
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1

# Clipboard history (with quickshell integration)
exec-once = wl-paste --type text --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = wl-paste --type image --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'

# Cursor theme
exec-once = hyprctl setcursor Qogir 16
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Qogir"

# Wallpaper — using awww (successor of swww)
exec-once = awww-daemon
exec-once = ~/.config/awww/scripts/awww_randomize_multi.sh ~/Pictures/hyprwallpapers

# System tray apps
exec-once = nm-applet --indicator

# Notifications — swaync as fallback (quickshell handles notifications)
exec-once = swaync

# FocusTime daemon (app usage tracker)
exec-once = python3 ~/.config/quickshell/$qsConfig/scripts/focustime/focus_daemon.py &

# Additional services
exec-once = pypr
exec-once = kdeconnectd
exec-once = bauh-tray
