# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES - Ano Config
# ═══════════════════════════════════════════════════════════════════════════

# Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = _JAVA_AWT_WM_NONREPARENTING,1

env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland

# Applications (Flatpak paths)
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}

# Theming
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_SIZE,16
env = XCURSOR_THEME,Qogir

# XDG Specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Terminal application
env = TERMINAL,kitty

# Browser
env = BROWSER,zen-browser

# Editor
env = EDITOR,avim
