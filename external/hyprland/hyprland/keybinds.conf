# ═══════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - Ano Config
# Combines personal keybinds with Ano QuickShell integration
# ═══════════════════════════════════════════════════════════════════════════

$mainMod = SUPER
$pypr = /usr/bin/pypr-client

# ═══════════════════════════════════════════════════════════════════════════
# QUICKSHELL UI TOGGLES
# ═══════════════════════════════════════════════════════════════════════════

# Super key tap to toggle search/launcher (quickshell with rofi fallback)
bindid = Super, Super_L, Toggle search, global, quickshell:searchToggleRelease
bindid = Super, Super_R, Toggle search, global, quickshell:searchToggleRelease
bind = Super, Super_L, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill rofi || rofi -modi run,window,combi,ssh -show drun -show-icons
bind = Super, Super_R, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill rofi || rofi -modi run,window,combi,ssh -show drun -show-icons
binditn = Super, catchall, global, quickshell:searchToggleReleaseInterrupt
bind = Ctrl, Super_L, global, quickshell:searchToggleReleaseInterrupt
bind = Ctrl, Super_R, global, quickshell:searchToggleReleaseInterrupt
bind = Super, mouse:272, global, quickshell:searchToggleReleaseInterrupt
bind = Super, mouse:273, global, quickshell:searchToggleReleaseInterrupt

# Workspace number indicator on Super hold
bindit = ,Super_L, global, quickshell:workspaceNumber
bindit = ,Super_R, global, quickshell:workspaceNumber

# Overview (AnoView — 10 layout algorithms)
bind = $mainMod, Tab, exec, qs -c $qsConfig ipc call anoview toggle

# Task view (current workspace windows only)
bind = $mainMod, grave, exec, qs -c $qsConfig ipc call taskView toggle

# Sidebars (left = AI Chat + Notifications + Translator, right = controls)
bind = $mainMod, B, exec, qs -c $qsConfig ipc call sidebarLeft toggle
bind = $mainMod, N, exec, qs -c $qsConfig ipc call sidebarRight toggle

# App launcher (built-in search with DesktopEntries + calculator)
bind = $mainMod, A, exec, qs -c $qsConfig ipc call search toggle

# Control panel (floating notification-shade)
bind = $mainMod, I, exec, qs -c $qsConfig ipc call controlPanel toggle

# Settings overlay
bind = $mainMod, Comma, exec, qs -c $qsConfig ipc call settings toggle

# HUD (system dashboard: clock, gauges, network, spectrum, media)
bind = $mainMod+Shift, I, exec, qs -c $qsConfig ipc call hud toggle

# Clipboard history (QS built-in, rofi fallback)
bind = Alt, V, exec, qs -c $qsConfig ipc call clipboard toggle || cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Emoji picker
bind = $mainMod, period, exec, wofi-emoji

# Cheatsheet (searchable keybinds)
bind = $mainMod, Slash, exec, qs -c $qsConfig ipc call cheatsheet toggle

# Media controls overlay (full player with vinyl art + spectrum)
bind = $mainMod, O, exec, qs -c $qsConfig ipc call mediaControls toggle

# Session menu (hold-to-confirm: lock/logout/sleep/reboot/shutdown)
bind = $mainMod, X, exec, qs -c $qsConfig ipc call session toggle

# Toggle bar
bind = $mainMod+Shift, B, exec, qs -c $qsConfig ipc call bar toggle

# Wallpaper selector
bind = Ctrl+$mainMod, T, exec, qs -c $qsConfig ipc call wallpaperSelector toggle

# Weather panel
bind = $mainMod+Shift, W, exec, qs -c $qsConfig ipc call weatherPanel toggle

# Toggle dock
bind = $mainMod+Shift, D, exec, qs -c $qsConfig ipc call dock toggle

# FocusTime (app usage tracker)
bind = $mainMod+Shift, F, exec, qs -c $qsConfig ipc call focusTime toggle

# Display manager (monitor layout)
bind = Ctrl+$mainMod, D, exec, qs -c $qsConfig ipc call displayManager toggle

# Anti-flashbang shader (darkens bright screens at night)
bind = Ctrl+$mainMod, B, exec, qs -c $qsConfig ipc call antiFlashbang toggle

# Cycle panel family
bind = Ctrl+$mainMod, P, exec, qs -c $qsConfig ipc call panelFamily cycle

# Restart quickshell
bind = Ctrl+$mainMod, R, exec, killall qs quickshell; sleep 0.3; qs -c $qsConfig &

# ═══════════════════════════════════════════════════════════════════════════
# BRIGHTNESS & VOLUME (quickshell OSD)
# ═══════════════════════════════════════════════════════════════════════════
# Brightness — through QS (triggers OSD automatically)
bindle = , XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%-

# Volume — through QS Audio service (triggers OSD automatically)
bindle = , XF86AudioRaiseVolume, exec, qs -c $qsConfig ipc call audio increment || wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5
bindle = , XF86AudioLowerVolume, exec, qs -c $qsConfig ipc call audio decrement || wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, qs -c $qsConfig ipc call audio toggleMute || wpctl set-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, qs -c $qsConfig ipc call audio toggleMicMute || wpctl set-mute @DEFAULT_SOURCE@ toggle

# Keyboard backlight brightness
bindle = , XF86KbdBrightnessUp, exec, brightnessctl -d "*::kbd_backlight" s 10%+
bindle = , XF86KbdBrightnessDown, exec, brightnessctl -d "*::kbd_backlight" s 10%-
bindle = Alt, XF86MonBrightnessUp, exec, brightnessctl -d "*::kbd_backlight" s 10%+
bindle = Alt, XF86MonBrightnessDown, exec, brightnessctl -d "*::kbd_backlight" s 10%-

# Mute toggles
bind = $mainMod+Shift, M, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bind = $mainMod+Alt, M, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

# ═══════════════════════════════════════════════════════════════════════════
# SCREENSHOTS & SCREEN CAPTURE
# ═══════════════════════════════════════════════════════════════════════════
# Region screenshot (quickshell)
bind = $mainMod+Shift, S, global, quickshell:regionScreenshot
bind = $mainMod+Shift, S, exec, qs -c $qsConfig ipc call TEST_ALIVE || hyprshot --freeze --clipboard-only --mode region --silent

# OCR (text recognition from screen)
bind = $mainMod+Shift, X, global, quickshell:regionOcr

# Google Lens search
bind = $mainMod+Shift, G, global, quickshell:regionSearch

# Screen recording
bindl = $mainMod+Shift, R, global, quickshell:regionRecord
bindl = $mainMod+Shift, R, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/videos/record.sh
bindl = $mainMod+Shift+Alt, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound

# Fallback screenshots (swappy)
bind = Shift, Print, exec, grim -g "$(slurp)" - | swappy -f -
bindl = , Print, exec, grim - | wl-copy
bindln = Ctrl, Print, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png

# Color picker
bind = $mainMod+Shift, C, exec, hyprpicker -a && notify-send "Color picked" "$(wl-paste)"

# ═══════════════════════════════════════════════════════════════════════════
# ZOOM
# ═══════════════════════════════════════════════════════════════════════════
binde = $mainMod, Minus, exec, qs -c $qsConfig ipc call zoom zoomOut || ~/.config/quickshell/$qsConfig/scripts/hyprland/zoom.sh decrease 0.1
binde = $mainMod, Equal, exec, qs -c $qsConfig ipc call zoom zoomIn  || ~/.config/quickshell/$qsConfig/scripts/hyprland/zoom.sh increase 0.1

# ═══════════════════════════════════════════════════════════════════════════
# APP LAUNCHERS
# ═══════════════════════════════════════════════════════════════════════════
bind = $mainMod, RETURN, exec, kitty
bind = Ctrl+Alt, T, exec, ghostty
bind = $mainMod+Shift, Q, killactive,
bind = Ctrl+Alt, K, exec, hyprlock
bind = $mainMod+Ctrl, Q, exit,
bind = $mainMod, E, exec, nemo ~/Downloads
bind = Ctrl+Alt, B, exec, neovide --neovim-bin avim
bind = Ctrl+Alt, G, exec, brave
bind = $mainMod, W, exec, exo-open --launch webbrowser
bind = $mainMod, Z, exec, zen-browser
bind = $mainMod, P, exec, celluloid
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, D, exec, vicinae toggle
bind = $mainMod, R, exec, $HOME/.config/rofi/scripts/launcher.sh
bind = $mainMod, F, fullscreen,
bind = $mainMod, S, togglesplit,

bind = Ctrl+Shift, ESC, exec, kitty -e btop
bind = Ctrl+Alt, U, exec, pavucontrol
bind = $mainMod+Shift, O, exec, kitty -e avim ~/.config/hypr/Ano/hyprland.conf

bind = $mainMod, F1, exec, ~/.config/hypr/Ano/scripts/gamemode

# ═══════════════════════════════════════════════════════════════════════════
# PYPRLAND (scratchpads, expose, minimize)
# ═══════════════════════════════════════════════════════════════════════════
# Dropdown terminal (kitty scratchpad from top)
bind = $mainMod+Shift, T, exec, $pypr toggle term

# Minimize window to special workspace / restore
bind = $mainMod, M, togglespecialworkspace, minimized
bind = $mainMod+Shift, minus, exec, $pypr toggle_special minimized

# Expose (show all windows tiled temporarily) — disabled, using QS overview/taskView instead
# bind = $mainMod+Shift, E, exec, $pypr expose

# Fetch lost off-screen windows
bind = Ctrl+$mainMod, L, exec, $pypr lost_windows

# ═══════════════════════════════════════════════════════════════════════════
# WINDOW MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════
bind = $mainMod, G, togglegroup
bind = Alt, Tab, workspace, e+1
bind = Alt+Shift, Tab, workspace, e-1
bind = Alt, Tab, bringactivetotop
bind = Alt+Shift, Tab, bringactivetotop
bind = Alt, F4, killactive,
bind = $mainMod, Q, killactive,
bind = $mainMod+Shift+Alt, Q, exec, hyprctl kill

# Special workspace
bind = $mainMod+Alt, A, togglespecialworkspace
bind = $mainMod+Shift, A, movetoworkspace, special
bind = $mainMod+Alt, S, movetoworkspacesilent, special
bind = $mainMod, C, exec, hyprctl dispatch centerwindow

# Positioning
bind = $mainMod+Alt, Space, togglefloating,
bind = $mainMod+Alt, F, fullscreenstate, 0 3
bind = $mainMod, V, pseudo,

# Window split ratio
binde = $mainMod, Semicolon, splitratio, -0.1
binde = $mainMod, Apostrophe, splitratio, +0.1

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, BracketLeft, movefocus, l
bind = $mainMod, BracketRight, movefocus, r

# Move windows
bind = $mainMod+Shift, left, movewindow, l
bind = $mainMod+Shift, right, movewindow, r
bind = $mainMod+Shift, up, movewindow, u
bind = $mainMod+Shift, down, movewindow, d

# Resize windows
binde = $mainMod+Ctrl, left, resizeactive, -20 0
binde = $mainMod+Ctrl, right, resizeactive, 20 0
binde = $mainMod+Ctrl, up, resizeactive, 0 -20
binde = $mainMod+Ctrl, down, resizeactive, 0 20

# ═══════════════════════════════════════════════════════════════════════════
# WORKSPACES
# ═══════════════════════════════════════════════════════════════════════════
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod+Shift, 1, movetoworkspace, 1
bind = $mainMod+Shift, 2, movetoworkspace, 2
bind = $mainMod+Shift, 3, movetoworkspace, 3
bind = $mainMod+Shift, 4, movetoworkspace, 4
bind = $mainMod+Shift, 5, movetoworkspace, 5
bind = $mainMod+Shift, 6, movetoworkspace, 6
bind = $mainMod+Shift, 7, movetoworkspace, 7
bind = $mainMod+Shift, 8, movetoworkspace, 8
bind = $mainMod+Shift, 9, movetoworkspace, 9
bind = $mainMod+Shift, 0, movetoworkspace, 10

# Send to workspace silently
bind = $mainMod+Alt, 1, movetoworkspacesilent, 1
bind = $mainMod+Alt, 2, movetoworkspacesilent, 2
bind = $mainMod+Alt, 3, movetoworkspacesilent, 3
bind = $mainMod+Alt, 4, movetoworkspacesilent, 4
bind = $mainMod+Alt, 5, movetoworkspacesilent, 5
bind = $mainMod+Alt, 6, movetoworkspacesilent, 6
bind = $mainMod+Alt, 7, movetoworkspacesilent, 7
bind = $mainMod+Alt, 8, movetoworkspacesilent, 8
bind = $mainMod+Alt, 9, movetoworkspacesilent, 9
bind = $mainMod+Alt, 0, movetoworkspacesilent, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = Ctrl+$mainMod, Right, workspace, r+1
bind = Ctrl+$mainMod, Left, workspace, r-1
bind = $mainMod, Page_Down, workspace, +1
bind = $mainMod, Page_Up, workspace, -1

# Move window with scroll
bind = $mainMod+Shift, mouse_down, movetoworkspace, r-1
bind = $mainMod+Shift, mouse_up, movetoworkspace, r+1

# ═══════════════════════════════════════════════════════════════════════════
# MOUSE BINDS
# ═══════════════════════════════════════════════════════════════════════════
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:274, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════════════════
# MEDIA CONTROLS
# ═══════════════════════════════════════════════════════════════════════════
# Media — through QS MPRIS service (triggers OSD track change indicator)
bindl = , XF86AudioPlay, exec, qs -c $qsConfig ipc call mpris playPause || playerctl play-pause
bindl = , XF86AudioPause, exec, qs -c $qsConfig ipc call mpris playPause || playerctl play-pause
bindl = , XF86AudioNext, exec, qs -c $qsConfig ipc call mpris next || playerctl next
bindl = , XF86AudioPrev, exec, qs -c $qsConfig ipc call mpris previous || playerctl previous
bindl = $mainMod+Shift, N, exec, qs -c $qsConfig ipc call mpris next || playerctl next
bindl = $mainMod+Shift, P, exec, qs -c $qsConfig ipc call mpris playPause || playerctl play-pause

# ═══════════════════════════════════════════════════════════════════════════
# SESSION
# ═══════════════════════════════════════════════════════════════════════════
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod+Shift, L, exec, systemctl suspend || loginctl suspend
bind = Ctrl+Shift+Alt+$mainMod, Delete, exec, systemctl poweroff || loginctl poweroff

# ═══════════════════════════════════════════════════════════════════════════
# HARDWARE TOGGLES
# ═══════════════════════════════════════════════════════════════════════════
bindl = , XF86TouchpadToggle, exec, ~/.config/hypr/Ano/scripts/touchpad-toggle.sh
bindl = , XF86Close, killactive,

# ═══════════════════════════════════════════════════════════════════════════
# VIRTUAL MACHINE MODE (disable keybinds)
# ═══════════════════════════════════════════════════════════════════════════
bind = $mainMod+Alt, F1, exec, notify-send 'Virtual Machine Mode' 'Keybinds disabled. Hit Super+Alt+F1 to escape' -a 'Hyprland' && hyprctl dispatch submap virtual-machine
submap = virtual-machine
bind = $mainMod+Alt, F1, exec, notify-send 'Normal Mode' 'Keybinds re-enabled' -a 'Hyprland' && hyprctl dispatch submap global
submap = global
